<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - GameVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-config.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gv-bg min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <!-- Fondo inmersivo -->
    <div class="absolute inset-0 z-0">
        <img src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=1920&q=80" 
             alt="Gaming Background" 
             class="w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/75"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-gv-bg via-transparent to-transparent"></div>
    </div>

    <!-- Tarjeta de Registro -->
    <div class="relative z-10 w-full max-w-md mx-4 sm:mx-6">
        <div class="bg-gv-card/80 backdrop-blur-xl border border-gv-border rounded-2xl p-6 sm:p-8 shadow-2xl shadow-black/50">
            
            <!-- Logo -->
            <a href="index.html" class="flex items-center justify-center gap-2 mb-4 sm:mb-6 group">
                <div class="w-8 h-8 sm:w-10 sm:h-10 bg-gradient-to-br from-cyan-400 to-emerald-400 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6 text-gv-bg" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
                    </svg>
                </div>
                <span class="text-xl sm:text-2xl font-bold text-white">GameVault</span>
            </a>

            <!-- Titulo -->
            <div class="text-center mb-6 sm:mb-8">
                <h1 class="text-xl sm:text-2xl font-bold text-white mb-2">Unete a la comunidad</h1>
                <p class="text-gv-muted text-sm sm:text-base">Crea tu cuenta para valorar, comentar y armar tu lista de juegos</p>
            </div>

            <!-- Botones OAuth -->
            <div class="space-y-3 mb-4 sm:mb-6">
                <!-- Steam -->
                <button class="w-full flex items-center justify-center gap-3 bg-gv-steam hover:bg-gv-steam/80 text-white font-medium py-2.5 sm:py-3 px-3 sm:px-4 rounded-lg transition-all border border-gv-border hover:border-gv-muted">
                    <svg class="w-5 h-5 sm:w-5 sm:h-5" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3l-.5 3H13v6.95c5.05-.5 9-4.76 9-9.95 0-5.52-4.48-10-10-10z"/>
                    </svg>
                    <span class="text-sm sm:text-base">Registrarse con Steam</span>
                </button>
                <!-- Google -->
                <button class="w-full flex items-center justify-center gap-3 bg-white hover:bg-gray-100 text-gray-800 font-medium py-2.5 sm:py-3 px-3 sm:px-4 rounded-lg transition-all">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="text-sm sm:text-base">Registrarse con Google</span>
                </button>
            </div>

            <!-- Separador -->
            <div class="flex items-center gap-4 mb-4 sm:mb-6">
                <div class="flex-1 h-px bg-gv-border"></div>
                <span class="text-gv-muted text-xs sm:text-sm">O registrate con email</span>
                <div class="flex-1 h-px bg-gv-border"></div>
            </div>

            <!-- Formulario -->
            <form action="index.html" class="space-y-4">
                <!-- Nombre de usuario -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gv-text mb-2">Nombre de usuario</label>
                    <input type="text" id="username" placeholder="GamerPro99" 
                           class="w-full bg-gv-bg border border-gv-border rounded-lg px-3 sm:px-4 py-3 text-white placeholder-gv-muted focus:outline-none focus:border-gv-accent focus:ring-1 focus:ring-gv-accent transition-all text-sm sm:text-base">
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gv-text mb-2">Correo electronico</label>
                    <input type="email" id="email" placeholder="tu@email.com" 
                           class="w-full bg-gv-bg border border-gv-border rounded-lg px-3 sm:px-4 py-3 text-white placeholder-gv-muted focus:outline-none focus:border-gv-accent focus:ring-1 focus:ring-gv-accent transition-all text-sm sm:text-base">
                </div>

                <!-- Contrasena -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gv-text mb-2">Contrasena</label>
                    <div class="relative">
                        <input type="password" id="password" placeholder="Minimo 8 caracteres" 
                               class="w-full bg-gv-bg border border-gv-border rounded-lg px-3 sm:px-4 py-3 pr-10 sm:pr-12 text-white placeholder-gv-muted focus:outline-none focus:border-gv-accent focus:ring-1 focus:ring-gv-accent transition-all text-sm sm:text-base">
                        <button type="button" class="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-gv-muted hover:text-white transition-colors">
                            <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Confirmar Contrasena -->
                <div>
                    <label for="confirm-password" class="block text-sm font-medium text-gv-text mb-2">Confirmar contrasena</label>
                    <div class="relative">
                        <input type="password" id="confirm-password" placeholder="Repite tu contrasena" 
                               class="w-full bg-gv-bg border border-gv-border rounded-lg px-3 sm:px-4 py-3 pr-10 sm:pr-12 text-white placeholder-gv-muted focus:outline-none focus:border-gv-accent focus:ring-1 focus:ring-gv-accent transition-all text-sm sm:text-base">
                        <button type="button" class="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-gv-muted hover:text-white transition-colors">
                            <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Checkbox terminos -->
                <div class="flex items-start gap-3">
                    <input type="checkbox" id="terms" 
                           class="mt-1 w-4 h-4 rounded border-gv-border bg-gv-bg text-gv-accent focus:ring-gv-accent focus:ring-offset-0 cursor-pointer">
                    <label for="terms" class="text-xs sm:text-sm text-gv-muted cursor-pointer">
                        Acepto los <a href="#" class="text-gv-accent hover:underline">Terminos de Servicio</a> y la <a href="#" class="text-gv-accent hover:underline">Politica de Privacidad</a>
                    </label>
                </div>

                <!-- Boton Submit -->
                <button type="submit" 
                        class="w-full bg-gradient-to-r from-cyan-500 to-emerald-500 hover:from-cyan-400 hover:to-emerald-400 text-gv-bg font-bold py-3 px-4 rounded-lg transition-all transform hover:scale-[1.02] shadow-lg shadow-cyan-500/25 hover:shadow-cyan-500/40 text-sm sm:text-base">
                    Crear cuenta
                </button>
            </form>

            <!-- Link a Login -->
            <p class="text-center text-gv-muted text-xs sm:text-sm mt-4 sm:mt-6">
                Ya tienes una cuenta? 
                <a href="login.html" class="text-gv-accent hover:underline font-medium">Inicia sesion</a>
            </p>
        </div>

        <!-- Footer minimalista -->
        <p class="text-center text-gv-muted/60 text-xs mt-6">
            Al registrarte, aceptas recibir actualizaciones sobre nuevos juegos y ofertas.
        </p>
    </div>

</body>
</html>
