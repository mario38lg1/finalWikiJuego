<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguridad y Contraseña - GameVault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gv-bg': '#0a0a0b',
                        'gv-card': '#141416',
                        'gv-card-hover': '#1a1a1d',
                        'gv-border': '#2a2a2e',
                        'gv-accent': '#06b6d4',
                        'gv-accent-hover': '#22d3ee',
                        'gv-muted': '#71717a',
                        'gv-steam': '#1b2838',
                        'gv-danger': '#dc2626',
                        'gv-danger-hover': '#ef4444',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .menu-item {
            transition: all 0.2s ease;
        }
        .menu-item:hover {
            background: rgba(6, 182, 212, 0.1);
            border-left-color: #06b6d4;
        }
        .menu-item.active {
            background: rgba(6, 182, 212, 0.15);
            border-left-color: #06b6d4;
            color: #06b6d4;
        }
        .input-field {
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.1);
        }
        .toggle-checkbox:checked {
            background-color: #06b6d4;
        }
        .toggle-checkbox:checked + .toggle-label .toggle-inner {
            transform: translateX(100%);
        }
    </style>
</head>
<body class="bg-gv-bg text-white min-h-screen">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-gv-bg/95 backdrop-blur-md border-b border-gv-border">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <a href="index.html" class="flex items-center space-x-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-cyan-500 to-emerald-500 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/>
                        </svg>
                    </div>
                    <span class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-emerald-400 bg-clip-text text-transparent">GameVault</span>
                </a>

                <!-- Barra de busqueda -->
                <div class="flex-1 max-w-xl mx-8">
                    <div class="relative">
                        <input type="text" placeholder="Buscar videojuegos..." class="w-full bg-gv-card border border-gv-border rounded-full py-2.5 pl-12 pr-4 text-sm text-white placeholder-gv-muted focus:outline-none focus:border-gv-accent transition-colors">
                        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gv-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                        </svg>
                    </div>
                </div>

                <!-- Acciones usuario -->
                <div class="flex items-center space-x-4">
                    <!-- Wishlist -->
                    <a href="login.html" class="relative p-2 text-gv-muted hover:text-gv-accent transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                        </svg>
                        <span class="absolute -top-1 -right-1 w-5 h-5 bg-gv-accent text-white text-xs font-bold rounded-full flex items-center justify-center">3</span>
                    </a>

                    <!-- Avatar -->
                    <a href="settings.html" class="w-9 h-9 rounded-full ring-2 ring-gv-accent overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1566577134770-3d85bb3a9cc4?w=100&h=100&fit=crop&crop=face" alt="Usuario" class="w-full h-full object-cover">
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-24 pb-16">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            
            <!-- Titulo de pagina -->
            <h1 class="text-3xl font-bold text-white mb-8">Configuracion de la Cuenta</h1>

            <!-- Layout a dos columnas -->
            <div class="flex flex-col lg:flex-row gap-8">
                
                <!-- Columna Izquierda - Menu Lateral (25%) -->
                <aside class="lg:w-1/4">
                    <nav class="bg-gv-card rounded-xl border border-gv-border overflow-hidden">
                        <a href="settings.html" class="menu-item flex items-center space-x-3 px-4 py-3.5 border-l-4 border-transparent text-gv-muted">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            <span class="font-medium">Editar Perfil</span>
                        </a>
                        <a href="seguridad.html" class="menu-item active flex items-center space-x-3 px-4 py-3.5 border-l-4 border-transparent">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                            <span class="font-medium">Seguridad y Contrasena</span>
                        </a>
                        <a href="notificaciones.html" class="menu-item flex items-center space-x-3 px-4 py-3.5 border-l-4 border-transparent text-gv-muted">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                            </svg>
                            <span class="font-medium">Notificaciones</span>
                        </a>
                        <a href="conexiones.html" class="menu-item flex items-center space-x-3 px-4 py-3.5 border-l-4 border-transparent text-gv-muted">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/>
                            </svg>
                            <span class="font-medium">Conexiones (Steam/Google)</span>
                        </a>
                    </nav>
                </aside>

                <!-- Columna Derecha - Area de Formulario (75%) -->
                <div class="lg:w-3/4 space-y-8">
                    
                    <!-- Seccion Cambiar Contraseña -->
                    <section class="bg-gv-card rounded-xl border border-gv-border p-6">
                        <h2 class="text-lg font-semibold text-white mb-6">Cambiar Contraseña</h2>
                        
                        <form class="space-y-6">
                            <!-- Contraseña Actual -->
                            <div>
                                <label for="current-password" class="block text-sm font-medium text-gv-muted mb-2">Contraseña Actual</label>
                                <input type="password" id="current-password" placeholder="Ingresa tu contraseña actual" class="input-field w-full bg-gv-bg border border-gv-border rounded-lg px-4 py-3 text-white placeholder-gv-muted focus:outline-none">
                            </div>

                            <!-- Nueva Contraseña -->
                            <div>
                                <label for="new-password" class="block text-sm font-medium text-gv-muted mb-2">Nueva Contraseña</label>
                                <input type="password" id="new-password" placeholder="Ingresa tu nueva contraseña" class="input-field w-full bg-gv-bg border border-gv-border rounded-lg px-4 py-3 text-white placeholder-gv-muted focus:outline-none">
                            </div>

                            <!-- Confirmar Nueva Contraseña -->
                            <div>
                                <label for="confirm-password" class="block text-sm font-medium text-gv-muted mb-2">Confirmar Nueva Contraseña</label>
                                <input type="password" id="confirm-password" placeholder="Confirma tu nueva contraseña" class="input-field w-full bg-gv-bg border border-gv-border rounded-lg px-4 py-3 text-white placeholder-gv-muted focus:outline-none">
                            </div>
                        </form>
                    </section>

                    <!-- Seccion Autenticación 2FA -->
                    <section class="bg-gv-card rounded-xl border border-gv-border p-6">
                        <div class="flex items-center justify-between">
                            <div>
                                <h2 class="text-lg font-semibold text-white mb-2">Autenticación en 2 Pasos (2FA)</h2>
                                <p class="text-sm text-gv-muted">Añade una capa extra de seguridad a tu cuenta requiriendo un código de verificación además de tu contraseña.</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-14 h-7 bg-gv-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:start-[4px] after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-gv-accent"></div>
                            </label>
                        </div>
                    </section>

                    <!-- Botón Guardar Cambios -->
                    <div class="flex justify-end">
                        <button type="submit" class="px-6 py-3 bg-gv-accent hover:bg-gv-accent-hover text-white font-semibold rounded-lg shadow-lg shadow-cyan-500/25 hover:shadow-cyan-500/40 transition-all duration-300">
                            Guardar Cambios
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </main>

</body>
</html>
